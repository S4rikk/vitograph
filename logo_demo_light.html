<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VITOGRAPH Logo (Light Mode)</title>
    <style>
        :root {
            --bg-color: #f8fafc; /* Светлый фон (Slate 50) */
            --accent-blue: #0284c7; /* Более глубокий синий для светлого фона */
            --accent-green: #059669; /* Более глубокий зеленый */
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-color);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        }

        .container {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            animation: fadeIn 1.2s ease-out;
        }

        .logo-wrapper {
            position: relative;
            width: 300px;
            height: 300px;
            filter: drop-shadow(0 10px 25px rgba(2, 132, 199, 0.15));
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .logo-wrapper:hover {
            transform: scale(1.05);
        }

        svg {
            width: 100%;
            height: 100%;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Мягкое свечение для светлой темы */
        .central-glow {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 150px;
            height: 150px;
            background: radial-gradient(circle, rgba(14, 165, 233, 0.15) 0%, rgba(14, 165, 233, 0) 70%);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            filter: blur(40px);
            pointer-events: none;
            animation: pulse 5s infinite ease-in-out;
        }

        @keyframes pulse {
            0% { transform: translate(-50%, -50%) scale(1); opacity: 0.6; }
            50% { transform: translate(-50%, -50%) scale(1.3); opacity: 0.9; }
            100% { transform: translate(-50%, -50%) scale(1); opacity: 0.6; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo-wrapper">
            <div class="central-glow"></div>
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="-200 -200 400 400">
                <defs>
                  <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="0%">
                    <stop offset="0%" stop-color="#0284c7" />
                    <stop offset="100%" stop-color="#059669" />
                  </linearGradient>
                  <g id="fish-outline">
                    <path d="M 22 0 Q 80 -50 160 25 M 22 0 Q 80 50 160 -25"
                          fill="none" stroke="url(#grad1)" stroke-width="14" stroke-linecap="round"/>
                  </g>
                </defs>
              
                <g transform="rotate(-90)">
                  <g transform="rotate(0)">
                    <use href="#fish-outline" />
                    <line x1="40" y1="-18.77" x2="40" y2="18.77" stroke="#059669" stroke-width="6" stroke-linecap="round"/>
                    <line x1="56" y1="-23.69" x2="56" y2="23.69" stroke="#0284c7" stroke-width="6" stroke-linecap="round"/>
                    <line x1="72" y1="-25.76" x2="72" y2="25.76" stroke="#059669" stroke-width="6" stroke-linecap="round"/>
                    <line x1="88" y1="-23.78" x2="88" y2="23.78" stroke="#0284c7" stroke-width="6" stroke-linecap="round"/>
                    <line x1="104" y1="-18.73" x2="104" y2="18.73" stroke="#059669" stroke-width="6" stroke-linecap="round"/>
                    <line x1="120" y1="-12.75" x2="120" y2="12.75" stroke="#0284c7" stroke-width="6" stroke-linecap="round"/>
                  </g>
                  <g transform="rotate(120)">
                    <use href="#fish-outline" />
                    <line x1="40" y1="-18.79" x2="40" y2="18.79" stroke="#059669" stroke-width="6" stroke-linecap="round"/>
                    <line x1="56" y1="-23.86" x2="56" y2="23.86" stroke="#0284c7" stroke-width="6" stroke-linecap="round"/>
                    <line x1="72" y1="-25.50" x2="72" y2="25.50" stroke="#059669" stroke-width="6" stroke-linecap="round"/>
                    <line x1="88" y1="-23.53" x2="88" y2="23.53" stroke="#0284c7" stroke-width="6" stroke-linecap="round"/>
                    <line x1="104" y1="-18.51" x2="104" y2="18.51" stroke="#059669" stroke-width="6" stroke-linecap="round"/>
                    <line x1="120" y1="-12.53" x2="120" y2="12.53" stroke="#0284c7" stroke-width="6" stroke-linecap="round"/>
                  </g>
                  <g transform="rotate(240)">
                    <use href="#fish-outline" />
                    <line x1="40" y1="-18.48" x2="40" y2="18.48" stroke="#059669" stroke-width="6" stroke-linecap="round"/>
                    <line x1="56" y1="-23.54" x2="56" y2="23.54" stroke="#0284c7" stroke-width="6" stroke-linecap="round"/>
                    <line x1="72" y1="-25.52" x2="72" y2="25.52" stroke="#059669" stroke-width="6" stroke-linecap="round"/>
                    <line x1="88" y1="-23.54" x2="88" y2="23.54" stroke="#0284c7" stroke-width="6" stroke-linecap="round"/>
                    <line x1="104" y1="-18.54" x2="104" y2="18.54" stroke="#059669" stroke-width="6" stroke-linecap="round"/>
                    <line x1="120" y1="-12.52" x2="120" y2="12.52" stroke="#0284c7" stroke-width="6" stroke-linecap="round"/>
                  </g>
                  <circle cx="0" cy="0" r="10" fill="#0284c7" />
                </g>
            </svg>
        </div>
    </div>
</body>
</html>
