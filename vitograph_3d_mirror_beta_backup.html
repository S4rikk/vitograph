<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VITOGRAPH | STRATEGIC 3D HUD MIRROR</title>
    <script src="https://unpkg.com/3d-force-graph"></script>
    <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@300;400;700&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-cyan: #00f2ff;
            --neon-blue: #0066ff;
            --glass-bg: rgba(5, 10, 20, 0.85);
            --fui-border: rgba(0, 242, 255, 0.3);
        }

        body {
            margin: 0;
            padding: 0;
            background: #020408;
            color: white;
            font-family: 'Exo 2', sans-serif;
            overflow: hidden;
            background-image: 
                radial-gradient(circle at 50% 50%, rgba(0, 102, 255, 0.05) 0%, transparent 70%),
                linear-gradient(rgba(0, 242, 255, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 242, 255, 0.02) 1px, transparent 1px);
            background-size: 100% 100%, 50px 50px, 50px 50px;
        }

        #3d-graph {
            width: 100vw;
            height: 100vh;
        }

        /* FUI HUD LAYOUT */
        .hud-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 100;
        }

        .glass-panel {
            pointer-events: auto;
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            /* Original solid border removed in favor of the gradient perimeter */
            border: none;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.5);
        }

        #hud-sidebar {
            position: absolute;
            right: 40px;
            top: 40px;
            bottom: 40px;
            width: 400px;
            padding: 30px;
            /* Original clip path */
            clip-path: polygon(0 0, 100% 0, 100% 95%, 90% 100%, 0 100%);
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* 
           PRECISION GRADIENT PERIMETER 
           Inspired by Variant B: Each edge has a fading gradient and subtle glow.
        */
        #hud-sidebar::before {
            content: '';
            position: absolute;
            inset: 0;
            pointer-events: none;
            background-image: 
                /* Top border */
                linear-gradient(to right, transparent, var(--neon-cyan) 15%, var(--neon-cyan) 85%, transparent),
                /* Left border */
                linear-gradient(to bottom, transparent, var(--neon-cyan) 15%, var(--neon-cyan) 85%, transparent),
                /* Right border */
                linear-gradient(to bottom, transparent, var(--neon-cyan) 15%, var(--neon-cyan) 80%, transparent),
                /* Bottom border */
                linear-gradient(to right, transparent, var(--neon-cyan) 15%, var(--neon-cyan) 80%, transparent),
                /* Diagonal border */
                linear-gradient(135deg, transparent 40%, var(--neon-cyan) 50%, transparent 60%);
            
            background-size: 
                100% 1.5px, 
                1.5px 100%, 
                1.5px 95%, 
                90% 1.5px, 
                80px 80px;
            
            background-position: 
                0 0, 
                0 0, 
                100% 0, 
                0 100%, 
                bottom -18px right -18px;
            
            background-repeat: no-repeat;
            
            /* Feathered glow effect as per Variant B refined look */
            filter: drop-shadow(0 0 1.5px var(--neon-cyan));
            opacity: 0.8;
            z-index: 10;
        }

        .hud-header {
            border-bottom: 2px solid var(--neon-cyan);
            padding-bottom: 15px;
        }

        .brand {
            font-family: 'Orbitron', sans-serif;
            font-size: 24px;
            letter-spacing: 4px;
            color: var(--neon-cyan);
            text-shadow: 0 0 10px var(--neon-cyan);
        }

        .subtitle {
            font-size: 10px;
            letter-spacing: 2px;
            opacity: 0.6;
            margin-top: 5px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .stat-card {
            border: 1px solid var(--fui-border);
            padding: 15px;
            text-align: center;
            background: rgba(0, 242, 255, 0.03);
        }

        .stat-value {
            font-family: 'Orbitron', sans-serif;
            font-size: 20px;
            color: var(--neon-cyan);
        }

        .stat-label {
            font-size: 9px;
            text-transform: uppercase;
            opacity: 0.5;
        }

        #detail-view {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            gap: 15px;
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        .category-tag {
            background: var(--neon-cyan);
            color: black;
            font-weight: bold;
            padding: 4px 10px;
            font-size: 10px;
            display: inline-block;
            clip-path: polygon(0 0, 90% 0, 100% 100%, 10% 100%);
        }

        .module-name {
            font-family: 'Orbitron', sans-serif;
            font-size: 18px;
            color: white;
            line-height: 1.4;
        }

        .path-box {
            font-family: monospace;
            font-size: 11px;
            color: var(--neon-cyan);
            background: rgba(0, 0, 0, 0.3);
            padding: 10px;
            border-left: 3px solid var(--neon-cyan);
            word-break: break-all;
        }

        .description-box {
            font-size: 14px;
            line-height: 1.6;
            color: rgba(255, 255, 255, 0.8);
            border: 1px dashed var(--fui-border);
            padding: 15px;
        }

        #search-container {
            pointer-events: auto;
            position: absolute;
            left: 40px;
            top: 40px;
            width: 300px;
        }

        #search {
            width: 100%;
            background: rgba(0,0,0,0.5);
            border: 1px solid var(--fui-border);
            padding: 15px;
            color: var(--neon-cyan);
            font-family: 'Orbitron', sans-serif;
            outline: none;
        }

        #laser-svg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 50;
        }

        #laser {
            stroke: var(--neon-cyan);
            stroke-width: 1;
            fill: none;
            filter: drop-shadow(0 0 5px var(--neon-cyan));
            opacity: 0.6;
            stroke-dasharray: 5 5;
            animation: dash 1s linear infinite;
        }

        @keyframes dash {
            to { stroke-dashoffset: -10; }
        }

        .scanline {
            width: 100%;
            height: 100px;
            z-index: 200;
            background: linear-gradient(0deg, rgba(0, 0, 0, 0) 0%, rgba(0, 242, 255, 0.05) 50%, rgba(0, 0, 0, 0) 100%);
            opacity: 0.1;
            position: absolute;
            bottom: 100%;
            animation: scanline 8s linear infinite;
        }

        @keyframes scanline {
            0% { bottom: 100%; }
            100% { bottom: -100px; }
        }
    </style>
</head>

{"opacity": 0.7}, "confidence": "EXTRACTED"}];

        document.getElementById('count-modules').innerText = RAW_NODES_DATA.length;
        document.getElementById('count-edges').innerText = RAW_EDGES_DATA.length;

        // Calculate node degrees (connections) to determine hierarchy
        const nodeDegrees = {};
        RAW_EDGES_DATA.forEach(edge => {
            nodeDegrees[edge.from] = (nodeDegrees[edge.from] || 0) + 1;
            nodeDegrees[edge.to] = (nodeDegrees[edge.to] || 0) + 1;
        });

        const RAW_DATA = {
            nodes: RAW_NODES_DATA.map(node => {
                const deg = nodeDegrees[node.id] || 0;
                // Volumes for cbrt scaling: 1 (minor), 8 (major, 2x radius), 27 (core, 3x radius)
                let calculatedVal = 1; 
                if (deg >= 15) {
                    calculatedVal = 27; // Core nodes (very large)
                } else if (deg >= 5) {
                    calculatedVal = 8;  // Secondary/Major nodes (medium)
                }
                return {
                    id: node.id,
                    name: node.label,
                    val: calculatedVal,
                    color: (node.color && node.color.background) ? node.color.background : '#00f2ff',
                    file: node.source_file || 'unknown'
                };
            }),
            links: RAW_EDGES_DATA.map(edge => ({
                source: edge.from,
                target: edge.to
            }))
        };

        // Semantic Translation (Investor & Demo Friendly)
        function translateNode(node) {
            const name = node.name || 'UNKNOWN';
            const file = node.file || '';

            // 1. Cluster Level Analysis (Macro) - Investor Friendly

            if (file.includes('apps/api') || name.includes('api_') || file.includes('ai') || file.includes('services/')) {

            const lowerName = name.toLowerCase();

                nodeType = "ОТДЕЛ ОБРАБОТКИ ИНФОРМАЦИИ";

            } else if (lowerName.includes('user') || lowerName.includes('profile') || lowerName.includes('account')) {

            } else if (lowerName.includes('chat') || lowerName.includes('assistant') || lowerName.includes('prompt') || lowerName.includes('llm')) {
                nodeType = "ОТДЕЛ КОММУНИКАЦИИ С ИИ";
                nodeDesc = `Специалисты-переводчики. Работают в узле ${name}, конструируя из ваших слов идеальный запрос (prompt), чтобы нейросеть дала точный ответ.`;
            } else if (lowerName.includes('db') || lowerName.includes('migration') || lowerName.includes('sql') || lowerName.includes('repository')) {
                nodeType = "ИНЖЕНЕРНЫЙ КОРПУС ХРАНИЛИЩА";
                nodeDesc = `Суровые инженеры базы данных. Физически размещают объекты ${name} в ячейках памяти и следят, чтобы структура связей никогда не разрушилась.`;
            } else if (lowerName.includes('config') || lowerName.includes('setting') || lowerName.includes('env')) {
                nodeType = "ПУЛЬТ УПРАВЛЕНИЯ ПОЛЕТАМИ";
                nodeDesc = `Закрытая диспетчерская ${name}. Здесь задаются базовые настройки и секретные ключи, от которых зависит направление и работа всей платформы.`;
            } else if (lowerName.includes('upload') || lowerName.includes('file') || lowerName.includes('storage') || lowerName.includes('media')) {
                nodeType = "ГРУЗОВОЙ ТЕРМИНАЛ";
                nodeDesc = `Служба логистики. Принимает ваши фотографии и документы через шлюз ${name}, проверяет их на безопасность и раскладывает по защищенным ячейкам.`;
            } else if (lowerName.includes('payment') || lowerName.includes('stripe') || lowerName.includes('billing')) {
                nodeType = "ФИНАНСОВЫЙ ДЕПАРТАМЕНТ";
                nodeDesc = "Электронные бухгалтеры. Они следят за статусом подписок, обрабатывают транзакции и обеспечивают банковский уровень безопасности платежей.";
            } else if (lowerName.includes('email') || lowerName.includes('notification') || lowerName.includes('sms')) {
                nodeType = "СЛУЖБА ДОСТАВКИ УВЕДОМЛЕНИЙ";
                nodeDesc = "Цифровые курьеры. Их единственная задача — моментально доставить вам важное письмо, отчет или пуш-уведомление точно в срок.";
            } else if (lowerName.includes('model') || lowerName.includes('entity') || lowerName.includes('interface')) {
                nodeType = "АРХИВ ЭТАЛОНОВ";
                nodeDesc = `Хранит идеальные чертежи для ${name}, гарантируя, что все смежные компоненты общаются на одном строгом математическом языке.`;
            } else if (lowerName.includes('util') || lowerName.includes('helper') || lowerName.includes('common')) {
                nodeType = "СЛУЖБА ТЕХНИЧЕСКОЙ ПОДДЕРЖКИ";
                nodeDesc = `Универсальные мастера. Предоставляют инструменты и утилиты типа ${name} для всех остальных отделов, избавляя их от рутинной работы.`;
            } else if (lowerName.includes('store') || lowerName.includes('state') || lowerName.includes('context')) {
                nodeType = "ОТДЕЛ ОПЕРАТИВНОЙ ПАМЯТИ";
                nodeDesc = `Удерживает текущее состояние интерфейса (${name}), пока вы с ним работаете, чтобы данные не потерялись при переходе между экранами.`;
            } else if (lowerName.includes('middleware') || lowerName.includes('interceptor')) {
                nodeType = "ТАМОЖЕННЫЙ КОНТРОЛЬ";
                nodeDesc = `Внимательно проверяет каждый проходящий запрос ${name} на соответствие правилам безопасности платформы, блокируя подозрительные пакеты.`;
            } else if (lowerName.includes('hook') || lowerName.includes('use')) {
                nodeType = "СЛУЖБА БЫСТРОГО РЕАГИРОВАНИЯ";
                nodeDesc = `Специальные агенты интерфейса. Подключаются к событиям ${name} и за миллисекунды перерисовывают экран при любых изменениях.`;
            } else if (lowerName.includes('log') || lowerName.includes('trace') || lowerName.includes('monitor')) {
                nodeType = "БЮРО РАССЛЕДОВАНИЙ";
                nodeDesc = `Ведет подробный журнал всех событий системы (${name}), чтобы в случае инцидента точно знать, какой процесс дал сбой.`;
            } else if (lowerName.includes('api') || lowerName.includes('client') || lowerName.includes('fetch')) {
                nodeType = "СЛУЖБА ВНЕШНЕЙ РАЗВЕДКИ";

                nodeType = "АРХИТЕКТУРНЫЙ ФУНДАМЕНТ";
                nodeDesc = "Строительная бригада интерфейса. Отвечает за то, чтобы меню, подвалы и боковые панели всегда оставались на своих местах на любом экране.";
            } else if (lowerName.includes('route') || lowerName.includes('endpoint')) {
                nodeType = "УЗЕЛ СВЯЗИ";
                nodeDesc = `Телефонный коммутатор ${name}. Принимает ваш клик по кнопке, звонит нужному специалисту на бэкенде и возвращает вам ответ.`;

            return { 
                cat: clusterTitle, 
                title: name.toUpperCase(), 
                desc: `${clusterDesc}\n\n[ОТДЕЛ: ${nodeType}]\n${nodeDesc}` 
            };
        }

        const Graph = ForceGraph3D()(document.getElementById('3d-graph'))
            .graphData(RAW_DATA)
            .nodeLabel('name')
            .nodeColor('color')
            .nodeRelSize(3) // Clean default size without glow logic
            .nodeResolution(24) // Makes geometry perfectly spherical instead of low-poly
            .linkDirectionalParticles(2)
            .linkDirectionalParticleWidth(1.5)
            .linkDirectionalParticleSpeed(d => Math.random() * 0.005 + 0.002)
            .onNodeClick(node => {
                focusNode(node);
            });

        // Forces
        Graph.d3Force('charge').strength(-120).distanceMax(800);
        
        // Custom gravity to pull distant nodes into a cohesive sphere
        const customGravity = function(alpha) {
            const nodes = Graph.graphData().nodes;
            const strength = 0.03 * alpha; 
            for (let i = 0; i < nodes.length; i++) {
                const node = nodes[i];
                node.vx -= (node.x || 0) * strength;
                node.vy -= (node.y || 0) * strength;
                node.vz -= (node.z || 0) * strength;
            }
        };
        Graph.d3Force('gravity', customGravity);

        Graph.onEngineStop(() => { 
            console.log('Engine simulation complete.');
            // Graph.zoomToFit(400); // Disabled: prevented sudden camera zoom-outs during interaction
        });

        // Controls
        Graph.controls().autoRotate = true;
        Graph.controls().autoRotateSpeed = 0.5;
        Graph.controls().rotateSpeed = 0.4;

        const stopAutoRotate = () => { Graph.controls().autoRotate = false; };
        window.addEventListener('mousedown', stopAutoRotate);
        window.addEventListener('wheel', stopAutoRotate);

        let selectedNode = null;

        function focusNode(node) {
            selectedNode = node;
            document.getElementById('detail-view').style.opacity = '1';
            
            const semantic = translateNode(node);
            document.getElementById('detail-category').innerText = semantic.cat;
            document.getElementById('detail-title').innerText = semantic.title;
            document.getElementById('detail-path').innerText = node.file;
            document.getElementById('detail-desc').innerText = semantic.desc;

            const distance = 160; // Increased distance so the node appears half the size
            const distRatio = 1 + distance/Math.hypot(node.x, node.y, node.z);

            Graph.cameraPosition(
                { x: node.x * distRatio, y: node.y * distRatio, z: node.z * distRatio }, // new pos
                node, // lookAt
                1500  // ms
            );
        }

        function updateLaser() {
            if (!selectedNode) return;
            try {
                const THREE_CORE = window.THREE || Graph.scene().__proto__.constructor.THREE;
                if (!THREE_CORE) return;

                const nodePos = new THREE_CORE.Vector3(selectedNode.x, selectedNode.y, selectedNode.z);
                const camera = Graph.camera();
                nodePos.project(camera);
                
                const x = (nodePos.x + 1) * window.innerWidth / 2;
                const y = -(nodePos.y - 1) * window.innerHeight / 2;
                
                const hudX = window.innerWidth - 440;
                const hudY = 300; 

                // Backticks inside f-string must be properly escaped if we were using it in Python, 
                // but since we are writing raw javascript we just use backticks:
                document.getElementById('laser').setAttribute('d', `M ${x} ${y} L ${hudX} ${hudY}`);
            } catch (e) {
                // ignore
            }
        }

        (function animate() {
            updateLaser();
            requestAnimationFrame(animate);
        })();
    </script>
